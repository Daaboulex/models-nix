name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Check flake
        run: nix flake check --no-build
      - name: Build package
        run: nix build .#default --no-link
        timeout-minutes: 30
      - name: Verify binary
        run: nix run . -- --version
